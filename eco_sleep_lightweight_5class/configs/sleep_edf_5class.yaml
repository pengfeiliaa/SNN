raw_dir: "F:/论文/daima1/datasets/edf"
processed_dir: "E:/papercode/eco_sleep_lightweight_5class/data/sleep_edf_20_processed"
runs_dir: "E:/papercode/eco_sleep_lightweight_5class/runs"

preprocess:
  reuse_existing: false
  force_rebuild: false

dataset:
  edf_subset: "edf20"

split:
  protocol: "subject_kfold"
  test_ratio: 0.2
kfold: 5
val_ratio: 0.1
split_constraints:
  min_count_per_class: 30
  max_tries: 500

batch_size: 32
lr: 0.001
weight_decay: 0.01
epochs: 12
early_stop_metric: "macro_f1"
early_stop_patience: 4
min_epochs: 3
max_grad_norm: 1.0

model:
  name: "context_pico_snn"
  use_masked_bpsr: true
  use_integer_spike: true

loss:
  name: "ldam"
  use_class_weights: false
  tau: 0.0
  ldam_max_margin: 0.35
  ldam_scale: 18.0

lcs:
  delta: 0.13

picosleepnet_baseline:
  window_size: 40
  input_neurons_each: 40
  reservoir_size: 150
  hidden_size: 50
  tau: 0.95
  v_th: 1.0
  surrogate_alpha: 4.0
  use_masked_bpsr: true
  use_integer_spike: true
  lambda_s: 1.0e-8
  lambda_w: 0.005
  mask_alpha: 4.0
  qat_bits: 6

picosleepnet_rsnn:
  window_size: 40
  input_neurons_each: 40
  reservoir_size: 150
  hidden_size: 50
  tau: 0.95
  v_th: 1.0
  surrogate_alpha: 4.0
  use_masked_bpsr: true
  use_integer_spike: true
  lambda_s: 1.0e-8
  lambda_w: 0.005
  mask_alpha: 4.0
  qat_bits: 6

picosleepnet_plus_snn:
  window_size: 40
  input_neurons_each: 40
  reservoir_size: 150
  hidden_size: 50
  tau: 0.95
  v_th: 1.0
  surrogate_alpha: 4.0
  use_masked_bpsr: true
  use_integer_spike: true
  lcs_delta_small: 0.08
  lcs_delta_large: 0.18
  aux_sleep_weight: 0.1
  aux_rem_weight: 0.1
  mask_alpha: 4.0
  qat_bits: 6

train:
  sampler: "weighted"
  sampler_balance_power: 1.0
  recipe_name: "context_pico_v1_ldam"
  preset: "context_pico"
  collapse_protection:
    enable: true
    trigger_ratio: 0.85
    patience_epochs: 2
    lr_decay: 0.5
  enable_qat: false
  qat_bits: 6
  qat_epochs: 2
  qat_lr: 0.0002
  use_aux_heads: true
  firing_reg_weight: 0.003
  firing_target_low: 0.03
  firing_target_high: 0.18
  aux_weight_sleepwake: 0.07
  aux_weight_rem: 0.05
  aux_weight_n1: 0.0
  input_norm_mode: "record_zscore"
  label_smoothing: 0.0
  label_smoothing_weight: 0.0
  temporal_consistency_enable: false
  temporal_consistency_weight: 0.0
  temporal_consistency_temperature: 1.0
  best_ckpt_n1_f1_floor: 0.15
  best_ckpt_n1_recall_floor: 0.12
  tc_zero_guard_epochs: 2
  tc_zero_guard_tol: 1.0e-8

seed: 42
mixed_precision: true
num_workers: 0
cache_mode: "mem"
allow_cpu: false

channels: ["Fpz-Cz"]
resample_hz: 100
crop_policy: "30min"

filters:
  bandpass:
    enable: true
    low: 0.3
    high: 35.0
    order: 4
  notch:
    enable: false
    freq: 50.0
    quality: 30.0

context_pico_snn:
  context_len: 3
  branch_channels: 4
  stem_channels: 12
  token_dim: 24
  epoch_hidden_size: 96
  epoch_embed_dim: 48
  context_hidden_size: 32
  t_steps: 40
  tau_epoch: 0.92
  tau_context: 0.90
  v_th_epoch: 1.0
  v_th_context: 1.0
  surrogate_alpha: 4.0
  dropout: 0.10
  use_aux_heads: true
  center_residual_weight: 0.35
  kernel_sizes: [31, 63, 125]

context_pico_snn_v2:
  context_len: 5
  branch_channels: 6
  stem_channels: 16
  token_dim: 32
  epoch_hidden_size: 96
  epoch_embed_dim: 48
  context_hidden_size: 40
  t_steps: 48
  tau_epoch: 0.92
  tau_context: 0.90
  v_th_epoch: 1.0
  v_th_context: 1.0
  surrogate_alpha: 4.0
  dropout: 0.10
  use_aux_heads: true
  use_n1_aux: true
  center_residual_weight: 0.40
  kernel_sizes: [15, 31, 63]
